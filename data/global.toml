# Global runtime settings for client/server.
# UI settings can be changed without rebuilding.

[ui]
# 0.0 = fully transparent bubble background, 1.0 = fully opaque.
speech_bubble_alpha = 0.5

# Name text sizes (base px before automatic UI scaling).
player_name_text_size = 13
monster_name_text_size = 16
npc_name_text_size = 13

# Speech text size (base px before automatic UI scaling).
speech_text_size = 16

[progression]
# EXP needed from level L to L+1:
# need(L) = a*L*L + b*L + c
exp_per_level_a = 0
exp_per_level_b = 50
exp_per_level_c = 100

[gameplay]
# Dead monsters respawn after this delay (milliseconds).
monster_respawn_ms = 15000
