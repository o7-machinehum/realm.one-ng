# Unique id comes from filename: rat.toml -> "rat"
name = "Rat"

# Sprite linkage:
# - sprite_tileset points to game/assets/art/<file>
# - sprite clip key is the monster id from filename ("rat")
sprite_tileset = "npc_test.tsx"
monster_size = "1x2"

max_hp = 30
strength = 6
speed_ms = 500
exp_reward = 10

[[drops]]
item = "wooden_sword"
chance = 0.20

[[drops]]
item = "wooden_shield"
chance = 0.20
