# Unique id comes from filename: rat.toml -> "rat"
name = "Rat"

# Sprite linkage:
# - sprite_tileset points to game/assets/art/<file>
# - sprite_name must match the tile property "name" used by Sprites loader
sprite_tileset = "npc_test.tsx"
sprite_name = "Rat"
monster_size = "1x2"

max_hp = 30
strength = 6
speed_ms = 500
exp_reward = 10

[[drops]]
item = "wooden_sword"
chance = 0.20

[[drops]]
item = "wooden_shield"
chance = 0.20


